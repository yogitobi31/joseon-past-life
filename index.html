<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>My Past Life in Joseon - Korean Past Life Personality Test</title>
    <meta
      name="description"
      content="Discover who you might have been in the Joseon Dynasty through a Korean-inspired personality test."
    />
    <meta property="og:title" content="My Past Life in Joseon - Korean Past Life Personality Test" />
    <meta property="og:description" content="Answer 12 questions and discover your Joseon past life character." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://your-project-name.vercel.app/" />
    <meta property="og:image" content="/og-placeholder.png" />
    <meta name="title-ko" content="내가 전생에 조선인이었다니 - 조선시대 전생 성향 테스트" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body data-page="test">
    <div class="paper-overlay"></div>

    <div class="site-shell">
      <header class="site-top">
        <nav class="site-nav" aria-label="Main menu">
          <a class="nav-link" href="index.html" data-i18n="menu.test"></a>
          <a class="nav-link" href="history.html" data-i18n="menu.stories"></a>
          <a class="nav-link" href="about.html" data-i18n="menu.about"></a>
          <a class="nav-link" href="privacy.html" data-i18n="menu.privacy"></a>
          <a class="nav-link" href="contact.html" data-i18n="menu.contact"></a>
        </nav>
        <div class="lang-switch" role="group" aria-label="Language">
          <button type="button" class="lang-btn" data-lang="en">EN</button>
          <button type="button" class="lang-btn" data-lang="ko">KR</button>
        </div>
      </header>

      <main class="app" aria-live="polite">
        <section id="start-screen" class="screen active">
          <p class="badge" data-i18n="test.badge"></p>
          <h1 data-i18n="test.title"></h1>
          <p class="lead" data-i18n="test.subtitle"></p>
          <button id="start-btn" class="btn btn-primary" data-i18n="test.startButton"></button>
        </section>

        <section id="quiz-screen" class="screen" aria-hidden="true">
          <div class="top-bar">
            <p id="progress-text">1 / 12</p>
            <div class="progress-track" aria-hidden="true">
              <div id="progress-fill" class="progress-fill"></div>
            </div>
          </div>

          <article class="question-card">
            <h2 id="question-title"></h2>
            <div id="answer-list" class="answer-list"></div>
          </article>
        </section>

        <section id="result-screen" class="screen" aria-hidden="true">
          <header class="result-header">
            <p class="result-label" data-i18n="test.resultLead"></p>
            <h2 id="result-title"></h2>
            <p id="result-identity" class="result-identity"></p>
          </header>

          <div class="result-card">
            <dl class="fact-grid">
              <div><dt data-i18n="result.name"></dt><dd id="result-name"></dd></div>
              <div><dt data-i18n="result.era"></dt><dd id="result-era"></dd></div>
              <div><dt data-i18n="result.region"></dt><dd id="result-place"></dd></div>
              <div><dt data-i18n="result.role"></dt><dd id="result-job"></dd></div>
              <div><dt data-i18n="result.object"></dt><dd id="result-object"></dd></div>
              <div><dt data-i18n="result.keywords"></dt><dd id="result-keywords"></dd></div>
              <div><dt data-i18n="result.talent"></dt><dd id="result-talent"></dd></div>
              <div><dt data-i18n="result.fear"></dt><dd id="result-fear"></dd></div>
              <div><dt data-i18n="result.motto"></dt><dd id="result-motto"></dd></div>
              <div><dt data-i18n="result.power"></dt><dd id="result-power"></dd></div>
            </dl>

            <section class="stats">
              <h3 data-i18n="result.stats"></h3>
              <div id="stats-list" class="stats-list"></div>
            </section>

            <section>
              <h3 data-i18n="result.summary"></h3>
              <p id="result-summary"></p>
              <p id="result-description"></p>
            </section>

            <section>
              <h3 data-i18n="result.why"></h3>
              <p id="result-why"></p>
            </section>

            <section class="last-scene">
              <h3 data-i18n="result.finalScene"></h3>
              <p id="result-ending"></p>
            </section>

            <section>
              <h3 data-i18n="result.today"></h3>
              <p id="result-today"></p>
            </section>
          </div>

          <div class="result-actions">
            <button id="retry-btn" class="btn btn-secondary" data-i18n="test.retake"></button>
            <button id="save-card-btn" class="btn btn-secondary" data-i18n="test.saveCard"></button>
            <button id="share-btn" class="btn btn-primary" data-i18n="test.share"></button>
          </div>
          <p id="save-card-status" class="save-card-status" aria-live="polite"></p>
        </section>
      </main>

      <section id="share-card-export" class="share-card-export" aria-hidden="true">
        <article id="share-card" class="share-card" role="presentation">
          <div class="share-card-paper"></div>
          <header class="share-top">
            <p id="share-brand" class="share-brand"></p>
            <div class="share-seal" aria-hidden="true"><span>印</span></div>
          </header>

          <section class="share-hero">
            <h2 id="share-title" class="share-title"></h2>
            <p id="share-name" class="share-name"></p>
            <div id="share-meta" class="share-meta"></div>
          </section>

          <section class="share-summary-section">
            <h3 id="share-summary-label" class="share-section-label"></h3>
            <p id="share-summary" class="share-summary"></p>
          </section>

          <section class="share-traits-section">
            <div>
              <h3 id="share-keywords-label" class="share-section-label"></h3>
              <div id="share-keywords" class="share-keywords"></div>
            </div>
            <div class="share-trait-grid">
              <div class="share-trait-item">
                <h4 id="share-object-label"></h4>
                <p id="share-object"></p>
              </div>
              <div class="share-trait-item">
                <h4 id="share-motto-label"></h4>
                <p id="share-motto"></p>
              </div>
            </div>
          </section>

          <section class="share-stats-section">
            <h3 id="share-stats-label" class="share-section-label"></h3>
            <div id="share-stats" class="share-stats"></div>
          </section>

          <footer class="share-footer">
            <p id="share-footer-line"></p>
            <p class="share-site">joseon-past-life</p>
          </footer>
        </article>
      </section>

      <footer class="site-footer">
        <div class="footer-links" aria-label="Footer links">
          <a href="index.html" data-i18n="menu.test"></a>
          <a href="history.html" data-i18n="menu.stories"></a>
          <a href="about.html" data-i18n="menu.about"></a>
          <a href="privacy.html" data-i18n="menu.privacy"></a>
          <a href="contact.html" data-i18n="menu.contact"></a>
        </div>
        <p class="footer-note" data-i18n="footer.note"></p>
      </footer>
    </div>

    <script src="i18n.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
